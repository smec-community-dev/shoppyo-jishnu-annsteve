<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Work+Sans:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#1a2d37",
                        "background-light": "#f6f7f7",
                        "background-dark": "#151a1d",
                        "accent-blue": "#d6e8ee",
                        "charcoal": "#333333"
                    },
                    fontFamily: {
                        "display": ["Work Sans", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
</head>
<body class="font-display text-charcoal dark:text-slate-100 min-h-screen" style="background: linear-gradient(135deg, #F5F9FA 0%, #D6E8EE 100%);">
<div class="relative flex h-auto min-h-screen w-full flex-col overflow-x-hidden">
<header class="flex items-center justify-between whitespace-nowrap px-6 md:px-10 py-4 shadow-md text-white bg-primary/95 backdrop-blur-sm sticky top-0 z-50">
<div class="flex items-center gap-4">
<div class="size-8 text-accent-blue">

enodd"></path>
</svg>
</div>
<h2 class="text-xl font-bold tracking-tight">ShoppyO</h2>
</div>
<div class="flex items-center gap-6">
<nav class="hidden md:flex gap-6 text-sm font-medium">
<a class="hover:text-accent-blue transition-colors" href="#">Shop</a>
<a class="hover:text-accent-blue transition-colors" href="#">Orders</a>
<a class="hover:text-accent-blue transition-colors" href="#">Support</a>
</nav>
<div class="flex gap-3">
<button class="flex items-center justify-center rounded-lg h-10 w-10 bg-white/10 hover:bg-white/20 transition-all">
<span class="material-symbols-outlined text-white">search</span>
</button>
<button class="flex items-center justify-center rounded-lg h-10 w-10 bg-white/10 hover:bg-white/20 transition-all">
<span class="material-symbols-outlined text-white">shopping_bag</span>
</button>
<div class="bg-center bg-no-repeat aspect-square bg-cover rounded-full size-10 border-2 border-accent-blue/50" data-alt="User profile avatar portrait" {% if profile_user.profile_image %}style='background-image: url("{{ profile_user.profile_image.url }}")'{% else %}style='background-image: url("https://lh3.googleusercontent.com/aida-public/AB6AXuDXZxcPoWlwr6Cd2CcWUmwkw6yhjseIkCT6pBKMKPChe2QTaH3WNPITXtl3kjA79LFidEZRwZdiEkcIhAjIPiJm0s6C9jei5Tur0M4l08cDczqAIJo_jzeGDTU91RRJONErIbtDzBVoSpPmXdtGvpZgUe8jwoDBiW5D34e5xgCAtNsB6_rACxOP-aSSWAa_2tDdo4IywMDGmSgfO_3gBR5lhR_kCgXyZF3FncABGOmByjLq4R15dahrkmtK51MTPu6l-DErbbmazPjU")'{% endif %}></div>
</div>
</div>
</header>
<main class="flex-1 py-16 px-4 md:px-8">
<div class="max-w-3xl mx-auto">
<div class="bg-white dark:bg-slate-900 rounded-2xl shadow-[0_20px_50px_rgba(0,0,0,0.1)] overflow-hidden border border-white dark:border-slate-800 max-w-3xl mx-auto">
<div class="p-8 border-b border-background-light dark:border-slate-800">
<div class="flex flex-col items-center gap-6">
<div class="relative group">
<div class="bg-center bg-no-repeat aspect-square bg-cover rounded-full h-32 w-32 border-4 border-accent-blue shadow-lg" data-alt="Large user profile picture preview" {% if profile_user.profile_image %}style='background-image: url("{{ profile_user.profile_image.url }}")'{% else %}style='background-image: url("https://lh3.googleusercontent.com/aida-public/AB6AXuC2IyLMMMStePek7M-QoSQzauzcIjaXCocKeuA-IXcDhHumBrdLdZVk6IeQPH9ge3JjDkX8FC4ioUp-CG8zhJMf8XTdqUKfwb0K1Vuooe8_F0eLaaJIX1rt7IQJ-Sw7PkKE-g2TZyE3pPbncxgP9tyNbMQrvw0uo5fKWw5ZwmORIvGfPeoZSlLU_BERIj-9FfzCk6XIBC3z7LrzID_PDiYQWHxWJgqaSWKlVLsEiZ95mYAgtz-_tzywlhsgMKbmjjpIaxS2ykhNRy54")'{% endif %}></div>
<button type="button" class="absolute bottom-0 right-0 p-2 bg-primary text-white rounded-full shadow-md hover:scale-110 transition-transform cursor-pointer" onclick="document.getElementById('profile_image_input').click()">
<span class="material-symbols-outlined text-sm">photo_camera</span>
</button>
</div>
<div class="text-center">
<h1 class="text-2xl font-bold text-primary dark:text-slate-100">Profile Settings</h1>
<p class="text-charcoal/60 dark:text-slate-400 mt-1">Update your personal information and contact details</p>
</div>
<button type="button" class="flex items-center gap-2 px-6 py-2 rounded-lg bg-accent-blue/30 text-primary font-semibold text-sm hover:bg-accent-blue/50 transition-colors cursor-pointer" onclick="document.getElementById('profile_image_input').click()">
<span class="material-symbols-outlined text-lg">upload</span>
                                Change Photo
                            </button>
</div>
</div>

{% if messages %}
<div class="px-8 pt-6">
    {% for message in messages %}
        <div class="mb-4 p-4 rounded-lg font-semibold
            {% if message.tags == 'success' %}
                bg-green-100 text-green-700 border border-green-300
            {% elif message.tags == 'error' %}
                bg-red-100 text-red-700 border border-red-300
            {% elif message.tags == 'warning' %}
                bg-yellow-100 text-yellow-700 border border-yellow-300
            {% else %}
                bg-blue-100 text-blue-700 border border-blue-300
            {% endif %}
        ">
            {{ message }}
        </div>
    {% endfor %}
</div>
{% endif %}

<form class="p-8 space-y-6" method="POST" enctype="multipart/form-data" id="profile_form">
    {% csrf_token %}
    <input type="file" name="profile_image" accept="image/*" class="hidden" id="profile_image_input" onchange="document.getElementById('profile_form').submit()"/>
<div class="grid grid-cols-1 md:grid-cols-2 gap-6">
<div class="flex flex-col gap-2">
<label class="text-charcoal dark:text-slate-300 text-xs font-bold uppercase tracking-wider flex items-center gap-2">
<span class="material-symbols-outlined text-lg opacity-70">person</span>
                                    First Name
                                </label>
<input class="w-full rounded-lg border-accent-blue/20 dark:border-slate-700 dark:bg-slate-800/50 p-3 text-charcoal dark:text-slate-100 focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all bg-accent-blue/30" name="first_name" placeholder="First name" type="text" value="{{ profile_user.first_name }}"/>
</div>
<div class="flex flex-col gap-2">
<label class="text-charcoal dark:text-slate-300 text-xs font-bold uppercase tracking-wider flex items-center gap-2">
<span class="material-symbols-outlined text-lg opacity-70">person</span>
                                    Last Name
                                </label>
<input class="w-full rounded-lg border-accent-blue/20 dark:border-slate-700 dark:bg-slate-800/50 p-3 text-charcoal dark:text-slate-100 focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all bg-accent-blue/30" name="last_name" placeholder="Last name" type="text" value="{{ profile_user.last_name }}"/>
</div>
<div class="flex flex-col gap-2">
<label class="text-charcoal dark:text-slate-300 text-xs font-bold uppercase tracking-wider flex items-center gap-2">
<span class="material-symbols-outlined text-lg opacity-70">mail</span>
                                    Update Email
                                </label>
<input class="w-full rounded-lg border-accent-blue/20 dark:border-slate-700 dark:bg-slate-800/50 p-3 text-charcoal dark:text-slate-100 focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all bg-accent-blue/30" type="email" name="email" placeholder="your.email@example.com" value="{{ profile_user.email }}"/>
</div>
<div class="flex flex-col gap-2">
<label class="text-charcoal dark:text-slate-300 text-xs font-bold uppercase tracking-wider flex items-center gap-2">
<span class="material-symbols-outlined text-lg opacity-70">phone</span>
                                    Phone Number
                                </label>
<input class="w-full rounded-lg border-accent-blue/20 dark:border-slate-700 dark:bg-slate-800/50 p-3 text-charcoal dark:text-slate-100 focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all bg-accent-blue/30" name="phone_number" placeholder="+91 xxxxxxxx" type="tel" value="{{ profile_user.phone_number }}"/>
</div>
</div>
<!-- <div class="flex flex-col gap-2">
<label class="text-charcoal dark:text-slate-300 text-xs font-bold uppercase tracking-wider flex items-center gap-2">
<span class="material-symbols-outlined text-lg opacity-70">location_on</span>
                                Shipping Address
                            </label>
<textarea class="w-full rounded-lg border-accent-blue/20 dark:border-slate-700 dark:bg-slate-800/50 p-3 text-charcoal dark:text-slate-100 focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all bg-accent-blue/30" name="address" placeholder="Street name, City, State, Zip Code" rows="3"></textarea>
</div> -->
<div class="pt-8 border-t border-background-light dark:border-slate-800 flex flex-col-reverse md:flex-row justify-end gap-4">
<a href="{% url 'customer_dashboard' %}" class="px-8 py-3 rounded-xl border border-accent-blue text-primary dark:text-accent-blue font-semibold hover:bg-accent-blue/10 transition-colors text-center">
                                Cancel
                            </a>
<button class="px-10 py-3 rounded-xl bg-primary text-white font-bold shadow-xl shadow-primary/30 hover:shadow-primary/40 hover:-translate-y-0.5 transition-all flex items-center justify-center gap-2" type="submit">
<span class="material-symbols-outlined text-xl">save</span>
                                Save Changes
                            </button>
</div>
</form>
</div>
<div class="mt-8 flex justify-center gap-8">
<button class="text-charcoal/40 dark:text-slate-500 text-sm font-medium hover:text-red-500 transition-colors flex items-center gap-1">
<span class="material-symbols-outlined text-lg">delete</span>
                        Delete Account
                    </button>
<button class="text-charcoal/40 dark:text-slate-500 text-sm font-medium hover:text-primary transition-colors flex items-center gap-1">
<span class="material-symbols-outlined text-lg">lock</span>
                        Privacy Policy
                    </button>
</div>
</div>
</main>
<footer class="py-8 text-center text-charcoal/40 dark:text-slate-500 text-xs">
<p>© 2024 ShoppyO E-commerce Platform. All rights reserved.</p>
</footer>
</div>
</body></html>
