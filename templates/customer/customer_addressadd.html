<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Update Address | ShoppyO</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@300;400;500;600;700;800;900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#ec5b13",
                        "navy-dark": "#1A2D37",
                        "ice-blue": "#D6E8EE",
                        "background-light": "#f8f6f6",
                        "background-dark": "#221610",
                    },
                    fontFamily: {
                        "display": ["Public Sans", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        body { font-family: 'Public Sans', sans-serif; }
    </style>
</head>
<body class="bg-[#f8fbfe] dark:bg-background-dark min-h-screen">
<!-- Navigation Bar -->
<nav class="bg-navy-dark border-b border-white/10 px-4 md:px-10 lg:px-40 py-3 sticky top-0 z-50">
<div class="max-w-[1200px] mx-auto flex items-center justify-between">
<div class="flex items-center gap-3 text-white">
<div class="size-8 bg-primary rounded-lg flex items-center justify-center">
<span class="material-symbols-outlined text-white" style="font-size: 20px;">shopping_bag</span>
</div>
<h2 class="text-white text-xl font-bold leading-tight tracking-tight">ShoppyO</h2>
</div>
<div class="hidden md:flex flex-1 justify-center gap-8">
<a class="text-slate-300 hover:text-white text-sm font-medium transition-colors" href="{% url 'customer_home' %}">Home</a>
<a class="text-slate-300 hover:text-white text-sm font-medium transition-colors" href="#">Shop</a>
<a class="text-white text-sm font-bold border-b-2 border-primary pb-1" href="{% url 'customer_dashboard' %}">Account</a>
<a class="text-slate-300 hover:text-white text-sm font-medium transition-colors" href="#">Cart</a>
</div>
<div class="flex items-center gap-4">
<button class="p-2 text-slate-300 hover:text-white transition-colors">
<span class="material-symbols-outlined">notifications</span>
</button>
<button class="p-2 text-slate-300 hover:text-white transition-colors">
<span class="material-symbols-outlined">favorite</span>
</button>
<div class="size-9 rounded-full bg-slate-700 border border-slate-600 overflow-hidden">
<img alt="User Avatar" class="w-full h-full object-cover" data-alt="User profile avatar placeholder image" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCRRlIP6uBPYK5bQftR4E-GXTEg8gyO_UYHdOLe6rO-CqgrpvcCjuRY3DfKpFk_FWBP3wC3f0L-AzvjbzXzZHecempvIqqrj3doU8RuO2NeMlsS2JDToAAm2tMUL1QWi-3DioOyGMHy7ky2yBnXAP73tLzcV73ktiqVhTM4QiiMpSAApJgHgJs_crRwvAb3zvnRJntSWQVDNFgXh24yB9zoY0ZGnPhIHB61OX-7bdvzOdSL3o0yI_OP84j7Dglmc-cW8dDrEKcpPuf5"/>
</div>
</div>
</div>
</nav>
<!-- Content Area -->
<main class="max-w-[1200px] mx-auto px-4 py-8 md:py-12">
<!-- Breadcrumbs -->
<div class="flex items-center gap-2 mb-8 text-sm text-slate-500 font-medium">
<a class="hover:text-primary transition-colors" href="{% url 'customer_home' %}">Home</a>
<span class="material-symbols-outlined text-xs">chevron_right</span>
<a class="hover:text-primary transition-colors" href="{% url 'customer_dashboard' %}">Account</a>
<span class="material-symbols-outlined text-xs">chevron_right</span>
<span class="text-navy-dark">Add New Address</span>
</div>
<div class="flex flex-col items-center">
<!-- Header -->
<div class="w-full max-w-2xl mb-8">
<h1 class="text-3xl font-black text-navy-dark tracking-tight mb-2">Add New Shipping Address</h1>
<p class="text-slate-600">Please provide your updated shipping information for future deliveries.</p>
</div>
<!-- Form Card -->
<div class="w-full max-w-2xl bg-white rounded-xl shadow-[0_8px_30px_rgb(0,0,0,0.04)] border border-slate-100 p-8 md:p-10">
<form method="POST" class="space-y-6">
    {% csrf_token %}
    <!-- full name -->
    <div class="space-y-2">
        <label class="block text-sm font-semibold text-slate-700" for="id_full_name">Full Name</label>
        <input id="id_full_name" name="full_name" class="w-full px-4 py-3 rounded-lg border border-slate-200 focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all text-slate-900" placeholder="John Doe" type="text"/>
    </div>
    <!-- phone -->
    <div class="space-y-2">
        <label class="block text-sm font-semibold text-slate-700" for="id_phone_number">Phone Number</label>
        <div class="relative">
            <span class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 material-symbols-outlined text-xl">call</span>
            <input id="id_phone_number" name="phone_number" class="w-full pl-12 pr-4 py-3 rounded-lg border border-slate-200 focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all text-slate-900" placeholder="+1 (555) 000-0000" type="tel"/>
        </div>
    </div>
    <!-- pincode -->
    <div class="space-y-2">
        <label class="block text-sm font-semibold text-slate-700" for="id_pincode">Postal Code</label>
        <input id="id_pincode" name="pincode" class="w-full px-4 py-3 rounded-lg border border-slate-200 focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all text-slate-900" placeholder="10001" type="text"/>
    </div>
    <!-- locality -->
    <div class="space-y-2">
        <label class="block text-sm font-semibold text-slate-700" for="id_locality">Locality/Area</label>
        <input id="id_locality" name="locality" class="w-full px-4 py-3 rounded-lg border border-slate-200 focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all text-slate-900" placeholder="Downtown" type="text"/>
    </div>
    <!-- house_info -->
    <div class="space-y-2">
        <label class="block text-sm font-semibold text-slate-700" for="id_house_info">Street / House info</label>
        <input id="id_house_info" name="house_info" class="w-full px-4 py-3 rounded-lg border border-slate-200 focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all text-slate-900" placeholder="123 Shopping Avenue" type="text"/>
    </div>
    <!-- city,state,country -->
    <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
        <div class="space-y-2">
            <label class="block text-sm font-semibold text-slate-700" for="id_city">City</label>
            <input id="id_city" name="city" class="w-full px-4 py-3 rounded-lg border border-slate-200 focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all text-slate-900" placeholder="New York" type="text"/>
        </div>
        <div class="space-y-2">
            <label class="block text-sm font-semibold text-slate-700" for="id_state">State</label>
            <input id="id_state" name="state" class="w-full px-4 py-3 rounded-lg border border-slate-200 focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all text-slate-900" placeholder="California" type="text"/>
        </div>
        <div class="space-y-2">
            <label class="block text-sm font-semibold text-slate-700" for="id_country">Country</label>
            <input id="id_country" name="country" class="w-full px-4 py-3 rounded-lg border border-slate-200 focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all text-slate-900" placeholder="India" type="text"/>
        </div>
    </div>
    <!-- landmark -->
    <div class="space-y-2">
        <label class="block text-sm font-semibold text-slate-700" for="id_landmark">Landmark <span class="text-slate-400 font-normal">(Optional)</span></label>
        <input id="id_landmark" name="landmark" class="w-full px-4 py-3 rounded-lg border border-slate-200 focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all text-slate-900" placeholder="Near Mall" type="text"/>
    </div>
    <!-- address type and default -->
    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
        <div class="space-y-2">
            <label class="block text-sm font-semibold text-slate-700" for="id_address_type">Address type</label>
            <select id="id_address_type" name="address_type" class="w-full px-4 py-3 rounded-lg border border-slate-200 focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all text-slate-900">
                <option value="HOME" selected>Home</option>
                <option value="WORK">Work</option>
            </select>
        </div>
        <div class="flex items-center gap-3 pt-2">
            <input id="id_is_default" type="checkbox" name="is_default" class="rounded border-primary/20 text-primary focus:ring-primary h-4 w-4" />
            <label for="id_is_default" class="ml-2 text-sm text-slate-700">Set as default</label>
        </div>
    </div>

<!-- Actions -->
<div class="flex flex-col-reverse md:flex-row items-center gap-4 pt-6 border-t border-slate-100">
<a href="{% url 'customer_address' %}" class="w-full md:w-auto px-8 py-3 rounded-lg font-bold text-slate-500 hover:text-slate-800 hover:bg-slate-50 transition-all border border-transparent">
                            Cancel
                        </a>
<button class="w-full md:flex-1 bg-navy-dark text-white px-8 py-3 rounded-lg font-bold hover:bg-slate-800 active:scale-[0.98] transition-all flex items-center justify-center gap-2" type="submit">
<span class="material-symbols-outlined text-lg">save</span>
                            Save Changes
                        </button>
</div>
</form>
</div>
<!-- Footer Help Text -->
<div class="mt-8 text-center text-slate-400 text-sm">
<p>Need help? Contact our <a class="text-primary font-semibold hover:underline" href="#">Support Team</a></p>
</div>
</div>
</main>
<!-- Background Decoration -->
<div class="fixed top-0 right-0 -z-10 w-1/3 h-1/3 bg-ice-blue/30 blur-[120px] rounded-full translate-x-1/2 -translate-y-1/2"></div>
<div class="fixed bottom-0 left-0 -z-10 w-1/2 h-1/2 bg-primary/5 blur-[150px] rounded-full -translate-x-1/4 translate-y-1/4"></div>
</body></html>
